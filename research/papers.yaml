
- title: "Legislating Symbols: Does Status Threat Cause Voters to Demand Symbolic Representation?"
  type: "Working"
  author:
    - Anne Marie Green
  date: 2026-01-01
  status: "Working paper"
  abstract: "I use machine learning to quantify and describe the scope of symbolic legislation in the U.S., and experimental survey research to understand what symbolic legislation means to voters, and how this meaning differs from material economic policies."
  categories:
    - Symbolic politics
    - Status threat
    - Representation
    - Political behavior

